openapi: 3.1.0
info:
  title: kasane
  description: ''
  license:
    name: ''
  version: 0.1.0
paths:
  /auth/login:
    post:
      tags:
      - Auth
      summary: ユーザーログインとJWTの発行
      description: ユーザー名とパスワードを検証し、Bearerトークンを発行します。
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: 認証失敗（ユーザー名またはパスワードが不正）
  /databases:
    get:
      tags:
      - databases
      summary: データベース一覧の取得
      description: |-
        ユーザー権限に応じて、アクセス可能なデータベースの一覧を取得します。

        - **グローバル管理者**: システム内の全データベースが見えます。
        - **一般ユーザー**: 自分が権限を持っているデータベースだけが見えます。
      operationId: database_list
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DatabaseInfoResponse'
      security:
      - bearer_auth: []
    post:
      tags:
      - databases
      summary: データベースの作成
      description: 新しいデータベースを作成します。この操作はGlobal Admin権限が必要です。
      operationId: database_create
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDatabaseRequest'
        required: true
      responses:
        '201':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatabaseInfoResponse'
      security:
      - bearer_auth:
        - global_admin
  /databases/{db_name}/tables:
    get:
      tags:
      - tables
      summary: テーブル一覧の取得
      description: 指定したデータベース内に存在するテーブルの一覧を取得します。この操作はデータベースのRead以上の権限が必要です。
      operationId: table_list
      parameters:
      - name: db_name
        in: path
        description: データベース名
        required: true
        schema:
          type: string
        example: example_database
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TableListResponse'
      security:
      - bearer_auth: []
    post:
      tags:
      - tables
      summary: テーブルの作成
      description: 指定したデータベース内に新しいテーブルを作成します。この操作はデータベースのWrite以上の権限が必要です。
      operationId: table_create
      parameters:
      - name: db_name
        in: path
        description: データベース名
        required: true
        schema:
          type: string
        example: example_database
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTableRequest'
        required: true
      responses:
        '201':
          description: ''
        '400':
          description: リクエストが不正（パラメータエラーなど）
        '409':
          description: 同名のテーブルが既に存在する
      security:
      - bearer_auth: []
  /databases/{db_name}/tables/{table_name}:
    get:
      tags:
      - tables
      summary: テーブル情報の取得
      description: 指定したテーブルの詳細情報を取得します。この操作はデータベースのRead以上の権限が必要です。
      operationId: table_info
      parameters:
      - name: db_name
        in: path
        description: データベース名
        required: true
        schema:
          type: string
        example: example_database
      - name: table_name
        in: path
        description: テーブル名
        required: true
        schema:
          type: string
        example: example_table
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TableInfoResponse'
        '404':
          description: テーブルまたはデータベースが存在しない
      security:
      - bearer_auth: []
    delete:
      tags:
      - tables
      summary: テーブルの削除
      description: 指定したテーブルを削除します。この操作はデータベースのWrite以上の権限が必要です。
      operationId: remove_table
      parameters:
      - name: db_name
        in: path
        description: データベース名
        required: true
        schema:
          type: string
        example: example_database
      - name: table_name
        in: path
        description: テーブル名
        required: true
        schema:
          type: string
        example: example_table
      responses:
        '204':
          description: ''
        '404':
          description: テーブルが存在しない
      security:
      - bearer_auth: []
  /databases/{db_name}/tables/{table_name}/data:
    put:
      tags:
      - data
      summary: データの上書き・追加
      description: |-
        指定した空間IDに対して、指定した値を書き込みます。
        既に値が存在する空間IDに対しては、その値を完全に上書きします。

        この操作はデータベースのWrite以上の権限が必要です。
      operationId: data_insert
      parameters:
      - name: db_name
        in: path
        description: データベース名
        required: true
        schema:
          type: string
        example: example_database
      - name: table_name
        in: path
        description: テーブル名
        required: true
        schema:
          type: string
        example: example_table
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InsertDataRequest'
        required: true
      responses:
        '200':
          description: ''
        '404':
          description: テーブルが存在しない
      security:
      - bearer_auth: []
    delete:
      tags:
      - data
      summary: データの削除
      description: 指定した空間IDをテーブルからを削除します。この操作はデータベースのWrite以上の権限が必要です。
      operationId: data_remove
      parameters:
      - name: db_name
        in: path
        description: データベース名
        required: true
        schema:
          type: string
        example: example_database
      - name: table_name
        in: path
        description: テーブル名
        required: true
        schema:
          type: string
        example: example_table
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RemoveDataRequest'
        required: true
      responses:
        '204':
          description: ''
        '404':
          description: テーブルが存在しない
      security:
      - bearer_auth: []
    patch:
      tags:
      - data
      summary: データの部分追加
      description: |-
        指定した空間IDに対して、指定した値を書き込みます。

        - **指定した空間IDがすでに存在する場合**: 既存のデータは維持されます。
        - **指定した空間IDが存在しない場合**: データが書き込まれます。

        この操作はデータベースのWrite以上の権限が必要です。
      operationId: data_upsert
      parameters:
      - name: db_name
        in: path
        description: データベース名
        required: true
        schema:
          type: string
        example: example_database
      - name: table_name
        in: path
        description: テーブル名
        required: true
        schema:
          type: string
        example: example_table
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InsertDataRequest'
        required: true
      responses:
        '204':
          description: ''
        '404':
          description: テーブルが存在しない
      security:
      - bearer_auth: []
  /databases/{db_name}/tables/{table_name}/data/search:
    post:
      tags:
      - data
      summary: データの一括取得
      description: 空間IDと値をJSON配列として一括で取得します。この操作はデータベースのRead以上の権限が必要です。
      operationId: data_get
      parameters:
      - name: db_name
        in: path
        description: データベース名
        required: true
        schema:
          type: string
        example: example_database
      - name: table_name
        in: path
        description: テーブル名
        required: true
        schema:
          type: string
        example: example_table
      - name: format
        in: query
        description: 出力フォーマット(singleId, rangeId, flexId)
        required: false
        schema:
          $ref: '#/components/schemas/OutputFormat'
      - name: limit
        in: query
        description: 最大取得件数
        required: false
        schema:
          type: integer
          minimum: 0
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetDataRequest'
        required: true
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetDataResponse'
        '404':
          description: テーブルが存在しない
      security:
      - bearer_auth: []
  /databases/{db_name}/tables/{table_name}/data/search/stream:
    post:
      tags:
      - data
      summary: データのストリーミング取得
      description: 空間IDと値をNDJSON形式のストリームとして順次取得します。この操作はデータベースのRead以上の権限が必要です。
      operationId: data_get_stream
      parameters:
      - name: db_name
        in: path
        description: データベース名
        required: true
        schema:
          type: string
        example: example_database
      - name: table_name
        in: path
        description: テーブル名
        required: true
        schema:
          type: string
        example: example_table
      - name: format
        in: query
        description: 出力フォーマット(singleId, rangeId, flexId)
        required: false
        schema:
          $ref: '#/components/schemas/OutputFormat'
      - name: limit
        in: query
        description: 最大取得件数
        required: false
        schema:
          type: integer
          minimum: 0
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetDataRequest'
        required: true
      responses:
        '200':
          description: ''
          content:
            text/plain:
              schema:
                type: string
      security:
      - bearer_auth: []
  /databases/{name}:
    get:
      tags:
      - databases
      summary: データベース情報の取得
      description: 指定したデータベースの詳細情報を取得します。対象データベースのRead以上の権限が必要です。
      operationId: database_info
      parameters:
      - name: name
        in: path
        description: データベース名
        required: true
        schema:
          type: string
        example: example_database
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatabaseInfoResponse'
      security:
      - bearer_auth: []
    delete:
      tags:
      - databases
      summary: データベースの削除
      description: 指定したデータベースを削除します。この操作はGlobal Admin権限が必要です。
      operationId: remove_database
      parameters:
      - name: name
        in: path
        description: データベース名
        required: true
        schema:
          type: string
        example: example_database
      responses:
        '204':
          description: ''
      security:
      - bearer_auth:
        - global_admin
  /users:
    get:
      tags:
      - Users
      summary: ユーザー一覧の取得
      description: ユーザーの一覧を取得します。この操作はGlobal Adminのみ実行可能です。
      operationId: list_users
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserInfoResponse'
      security:
      - bearer_auth:
        - global_admin
    post:
      tags:
      - Users
      summary: 新規ユーザー作成
      description: 新しいユーザーを作成し、パスワードやGlobal Adminを設定します。この操作はGlobal Adminのみ実行可能です。
      operationId: create_user
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
        required: true
      responses:
        '201':
          description: ''
        '409':
          description: 同名のユーザーが既に存在する
      security:
      - bearer_auth:
        - global_admin
  /users/{username}:
    delete:
      tags:
      - Users
      summary: ユーザーの削除
      description: 指定したユーザーを削除します。この操作はGlobal Adminのみ実行可能です。
      operationId: delete_user
      parameters:
      - name: username
        in: path
        description: ユーザー名
        required: true
        schema:
          type: string
        example: example_user
      responses:
        '204':
          description: ''
        '404':
          description: ユーザーが存在しない
      security:
      - bearer_auth:
        - global_admin
  /users/{username}/admin:
    put:
      tags:
      - Users
      summary: Global Admin権限の変更
      description: 指定したユーザーのGlobal Admin権限を付与または剥奪します。この操作はGlobal Adminのみ実行可能です。
      operationId: set_admin
      parameters:
      - name: username
        in: path
        description: ユーザー名
        required: true
        schema:
          type: string
        example: example_user
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAdminRequest'
        required: true
      responses:
        '204':
          description: ''
        '403':
          description: rootユーザーの権限は変更不可
        '404':
          description: ユーザーが存在しない
      security:
      - bearer_auth:
        - global_admin
  /users/{username}/password:
    put:
      tags:
      - Users
      summary: パスワードの更新
      description: 指定したユーザーのパスワードを更新します。ユーザー本人が自分自身のパスワードを変更するか、Global Adminが他人のパスワードをリセットする場合に利用可能です。
      operationId: update_password
      parameters:
      - name: username
        in: path
        description: ユーザー名
        required: true
        schema:
          type: string
        example: example_user
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePasswordRequest'
        required: true
      responses:
        '204':
          description: ''
        '404':
          description: ユーザーが存在しない
      security:
      - bearer_auth: []
  /users/{username}/privileges:
    get:
      tags:
      - Users
      summary: データベース権限の取得
      description: 指定したユーザーが持つデータベースごとのアクセス権限（Read, Write, Manage）の一覧を取得します。この操作はグローバル管理者のみ実行可能です。
      operationId: get_privileges
      parameters:
      - name: username
        in: path
        description: ユーザー名
        required: true
        schema:
          type: string
        example: example_user
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PrivilegeInfoResponse'
        '404':
          description: ユーザーが存在しない
      security:
      - bearer_auth:
        - global_admin
  /users/{username}/privileges/{db_name}:
    put:
      tags:
      - Users
      summary: データベース権限の設定
      description: 指定したユーザーに対し、特定のデータベースへのアクセス権限（Read, Write, Manage）を設定します。この操作はグローバル管理者のみ実行可能です。
      operationId: set_privilege
      parameters:
      - name: username
        in: path
        description: ユーザー名
        required: true
        schema:
          type: string
        example: example_user
      - name: db_name
        in: path
        description: データベース名
        required: true
        schema:
          type: string
        example: example_database
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePrivilegeRequest'
        required: true
      responses:
        '204':
          description: ''
        '404':
          description: ユーザーまたはデータベースが存在しない
      security:
      - bearer_auth:
        - global_admin
    delete:
      tags:
      - Users
      summary: データベース権限の削除
      description: 指定したユーザーから、特定のデータベースへのアクセス権限を削除します。この操作はGlobal Adminのみ実行可能です。
      operationId: delete_privilege
      parameters:
      - name: username
        in: path
        description: ユーザー名
        required: true
        schema:
          type: string
        example: example_user
      - name: db_name
        in: path
        description: データベース名
        required: true
        schema:
          type: string
        example: example_database
      responses:
        '204':
          description: ''
        '404':
          description: ユーザーまたはデータベースが存在しない
      security:
      - bearer_auth:
        - global_admin
components:
  schemas:
    CreateDatabaseRequest:
      type: object
      required:
      - name
      properties:
        name:
          type: string
          example: example_database
    CreateTableRequest:
      type: object
      description: 時空間IDと値が対応するTableを作成する
      required:
      - name
      - data_type
      - max_zoom_level
      properties:
        name:
          type: string
          example: example_table
        data_type:
          $ref: '#/components/schemas/TableDataType'
        max_zoom_level:
          type: integer
          format: int32
          example: 25
          maximum: 30
          minimum: 0
    CreateUserRequest:
      type: object
      required:
      - username
      - password
      - is_global_admin
      properties:
        username:
          type: string
          example: example_user
        password:
          type: string
          example: secret123
        is_global_admin:
          type: boolean
          example: false
    DataGroup_FlexId:
      type: object
      required:
      - valueRef
      - spatialIds
      properties:
        valueRef:
          type: integer
          minimum: 0
        spatialIds:
          type: array
          items:
            type: object
            required:
            - fZoomlevel
            - fIndex
            - xZoomlevel
            - xIndex
            - yZoomlevel
            - yIndex
            properties:
              fZoomlevel:
                type: integer
                format: int32
                example: 20
                maximum: 30
                minimum: 0
              fIndex:
                type: integer
                format: int32
                example: 0
              xZoomlevel:
                type: integer
                format: int32
                example: 20
                maximum: 30
                minimum: 0
              xIndex:
                type: integer
                format: int32
                example: 931386
                minimum: 0
              yZoomlevel:
                type: integer
                format: int32
                example: 20
                maximum: 30
                minimum: 0
              yIndex:
                type: integer
                format: int32
                example: 412905
                minimum: 0
    DataGroup_RangeId:
      type: object
      required:
      - valueRef
      - spatialIds
      properties:
        valueRef:
          type: integer
          minimum: 0
        spatialIds:
          type: array
          items:
            type: object
            required:
            - z
            - f
            - x
            - y
            properties:
              z:
                type: integer
                format: int32
                example: 20
                maximum: 30
                minimum: 0
              f:
                type: array
                items:
                  type: integer
                  format: int32
                example:
                - 0
                - 0
              x:
                type: array
                items:
                  type: integer
                  format: int32
                  minimum: 0
                example:
                - 931388
                - 931390
              y:
                type: array
                items:
                  type: integer
                  format: int32
                  minimum: 0
                example:
                - 412900
                - 412907
    DataGroup_SingleId:
      type: object
      required:
      - valueRef
      - spatialIds
      properties:
        valueRef:
          type: integer
          minimum: 0
        spatialIds:
          type: array
          items:
            type: object
            required:
            - z
            - f
            - x
            - y
            properties:
              z:
                type: integer
                format: int32
                example: 20
                maximum: 30
                minimum: 0
              f:
                type: integer
                format: int32
                example: 0
              x:
                type: integer
                format: int32
                example: 931386
                minimum: 0
              y:
                type: integer
                format: int32
                example: 412905
                minimum: 0
    DatabaseInfoResponse:
      type: object
      required:
      - name
      properties:
        name:
          type: string
          example: example_database
    FlexId:
      type: object
      required:
      - fZoomlevel
      - fIndex
      - xZoomlevel
      - xIndex
      - yZoomlevel
      - yIndex
      properties:
        fZoomlevel:
          type: integer
          format: int32
          example: 20
          maximum: 30
          minimum: 0
        fIndex:
          type: integer
          format: int32
          example: 0
        xZoomlevel:
          type: integer
          format: int32
          example: 20
          maximum: 30
          minimum: 0
        xIndex:
          type: integer
          format: int32
          example: 931386
          minimum: 0
        yZoomlevel:
          type: integer
          format: int32
          example: 20
          maximum: 30
          minimum: 0
        yIndex:
          type: integer
          format: int32
          example: 412905
          minimum: 0
    GetDataQuery:
      type: object
      properties:
        format:
          $ref: '#/components/schemas/OutputFormat'
        limit:
          type:
          - integer
          - 'null'
          minimum: 0
    GetDataRequest:
      type: object
      description: 空間IDの配列を指定して値を取得する
      required:
      - spatial_ids
      properties:
        spatial_ids:
          type: array
          items:
            $ref: '#/components/schemas/SpatialId'
        zoom_level_policy:
          $ref: '#/components/schemas/ZoomLevelPolicy'
    GetDataResponse:
      oneOf:
      - $ref: '#/components/schemas/GetDataResponseSingle'
      - $ref: '#/components/schemas/GetDataResponseRange'
      - $ref: '#/components/schemas/GetDataResponseFlex'
    GetDataResponseFlex:
      type: object
      required:
      - dictionary
      - data
      properties:
        dictionary:
          type: array
          items: {}
        data:
          type: array
          items:
            $ref: '#/components/schemas/DataGroup_FlexId'
    GetDataResponseRange:
      type: object
      required:
      - dictionary
      - data
      properties:
        dictionary:
          type: array
          items: {}
        data:
          type: array
          items:
            $ref: '#/components/schemas/DataGroup_RangeId'
    GetDataResponseSingle:
      type: object
      required:
      - dictionary
      - data
      properties:
        dictionary:
          type: array
          items: {}
        data:
          type: array
          items:
            $ref: '#/components/schemas/DataGroup_SingleId'
